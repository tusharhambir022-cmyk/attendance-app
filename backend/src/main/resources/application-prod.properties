# ==============================
# PRODUCTION - PostgreSQL (Render)
# Set DATABASE_URL env variable in Render dashboard
# ==============================
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.h2.console.enabled=false

# JWT
app.jwt.secret=${JWT_SECRET:MyVerySecretKeyForAttendanceAppThatIsLongEnoughForHS512Algorithm2024}
app.jwt.expiration=86400000

# CORS - update with your actual Vercel URL
app.cors.allowed-origins=${CORS_ORIGINS:https://your-app.vercel.app}

server.port=${PORT:8080}
