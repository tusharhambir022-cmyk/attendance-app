# ==============================
# APPLICATION CONFIGURATION
# ==============================
spring.application.name=attendance-backend

# ==============================
# DATABASE - H2 (Development)
# Switch to PostgreSQL for Render
# ==============================
spring.datasource.url=jdbc:h2:mem:attendancedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ==============================
# JWT
# ==============================
app.jwt.secret=MyVerySecretKeyForAttendanceAppThatIsLongEnoughForHS512Algorithm2024
app.jwt.expiration=86400000

# ==============================
# CORS
# ==============================
app.cors.allowed-origins=http://localhost:3000,https://your-app.vercel.app

# ==============================
# SERVER
# ==============================
server.port=8080
